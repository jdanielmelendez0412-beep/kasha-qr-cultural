<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 600'>
  <defs>
    <linearGradient id='sky2' x1='0%' y1='0%' x2='0%' y2='100%'>
      <stop offset='0%' style='stop-color:#FF6B35;stop-opacity:0.3'/>
      <stop offset='40%' style='stop-color:#FFC857;stop-opacity:0.2'/>
      <stop offset='100%' style='stop-color:#87CEEB'/>
    </linearGradient>
    <linearGradient id='sea' x1='0%' y1='0%' x2='0%' y2='100%'>
      <stop offset='0%' style='stop-color:#0077BE'/>
      <stop offset='100%' style='stop-color:#004E89'/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width='800' height='600' fill='url(#sky2)'/>
  <!-- Sun -->
  <circle cx='650' cy='120' r='50' fill='#FF6B35' opacity='0.6'/>
  <circle cx='650' cy='120' r='35' fill='#FFC857' opacity='0.8'/>
  <circle cx='650' cy='120' r='20' fill='#FFF8DC'/>
  <!-- Sea -->
  <rect x='0' y='350' width='800' height='250' fill='url(#sea)'/>
  <!-- Waves -->
  <path d='M0,370 Q50,360 100,370 Q150,380 200,370 Q250,360 300,370 Q350,380 400,370 Q450,360 500,370 Q550,380 600,370 Q650,360 700,370 Q750,380 800,370' fill='#87CEEB' opacity='0.3'/>
  <!-- Malecón/Pier -->
  <rect x='0' y='340' width='800' height='15' fill='#D2B48C'/>
  <rect x='300' y='340' width='200' height='8' fill='#8B7355'/>
  <!-- Palm trees -->
  <g transform='translate(100,280)'>
    <rect x='-3' y='0' width='6' height='60' fill='#5D4037'/>
    <path d='M0,0 Q-30,-20 -50,-10 Q-35,-5 0,0' fill='#2E7D32'/>
    <path d='M0,0 Q30,-20 50,-10 Q35,-5 0,0' fill='#388E3C'/>
    <path d='M0,0 Q-10,-25 -20,-25 Q-10,-10 0,0' fill='#43A047'/>
    <path d='M0,0 Q10,-25 20,-25 Q10,-10 0,0' fill='#4CAF50'/>
  </g>
  <g transform='translate(680,290)'>
    <rect x='-3' y='0' width='6' height='50' fill='#5D4037'/>
    <path d='M0,0 Q-30,-20 -50,-10 Q-35,-5 0,0' fill='#2E7D32'/>
    <path d='M0,0 Q30,-20 50,-10 Q35,-5 0,0' fill='#388E3C'/>
    <path d='M0,0 Q-10,-25 -20,-25 Q-10,-10 0,0' fill='#43A047'/>
    <path d='M0,0 Q10,-25 20,-25 Q10,-10 0,0' fill='#4CAF50'/>
  </g>
  <!-- Buildings silhouette -->
  <rect x='20' y='280' width='60' height='60' fill='#BDBDBD' opacity='0.5'/>
  <rect x='90' y='260' width='50' height='80' fill='#9E9E9E' opacity='0.5'/>
  <rect x='160' y='290' width='80' height='50' fill='#BDBDBD' opacity='0.5'/>
  <rect x='550' y='270' width='60' height='70' fill='#9E9E9E' opacity='0.5'/>
  <rect x='640' y='290' width='70' height='50' fill='#BDBDBD' opacity='0.5'/>
  <rect x='730' y='280' width='50' height='60' fill='#9E9E9E' opacity='0.5'/>
  <!-- Title -->
  <text x='400' y='180' text-anchor='middle' font-family='Segoe UI, sans-serif' font-size='28' font-weight='bold' fill='#333'>Riohacha</text>
  <text x='400' y='215' text-anchor='middle' font-family='Segoe UI, sans-serif' font-size='16' fill='#666'>La Guajira — Colombia</text>
  <!-- Wayuu mochila (bag) on the pier -->
  <rect x='375' y='310' width='50' height='30' rx='5' fill='#FF6B35'/>
  <path d='M375,310 L375,300 L425,300 L425,310' fill='none' stroke='#004E89' stroke-width='3'/>
  <line x1='400' y1='300' x2='400' y2='285' stroke='#5D4037' stroke-width='2'/>
</svg>