<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Ka'sha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">Admin - Ka'sha</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/monumento}">Monumento</a>
                <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Panel de administración</h2>
            <div>
                <span class="badge bg-primary fs-6" th:text="${#lists.size(visitas)} + ' registros'">0 registros</span>
                <a th:href="@{/api/exportar}" class="btn btn-success btn-sm ms-2 rounded-pill">Exportar CSV</a>
                <a th:href="@{/admin/logout}" class="btn btn-outline-danger btn-sm ms-2 rounded-pill">Cerrar sesión</a>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover table-striped">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Monumento</th>
                                <th>Edad</th>
                                <th>Procedencia</th>
                                <th>Tipo visitante</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="v : ${visitas}">
                                <td th:text="${v.id}">1</td>
                                <td th:text="${v.fecha}">2024-01-01</td>
                                <td th:text="${v.hora}">12:00:00</td>
                                <td th:text="${v.monumento}">Ka'sha</td>
                                <td th:text="${v.edad}">18-25</td>
                                <td th:text="${v.procedencia}">Riohacha</td>
                                <td th:text="${v.tipoVisitante}">Turista</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(visitas)}">
                                <td colspan="7" class="text-center text-muted">No hay registros aún.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
