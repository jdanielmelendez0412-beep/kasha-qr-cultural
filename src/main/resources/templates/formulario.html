<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Visitante - Ka'sha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-body p-5">
                        <h2 class="text-center fw-bold text-primary mb-1">Ka'sha</h2>
                        <p class="text-center text-muted mb-4">Tambor Wayuu — Riohacha, La Guajira</p>
                        <hr>
                        <h4 class="mb-3">Información del visitante</h4>
                        <p class="text-muted small mb-4">Completa los siguientes campos para acceder al contenido cultural. Los datos son anónimos y se utilizan únicamente con fines estadísticos.</p>
                        <p class="small text-muted text-center mb-3">Muestra: <strong th:text="${totalEncuestas}">0</strong> encuestas completadas</p>

                        <form th:action="@{/registrar}" method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Edad</label>
                                <select name="edad" class="form-select form-select-lg" required>
                                    <option value="">Selecciona tu rango de edad</option>
                                    <option value="Menor de 18 años">Menor de 18 años</option>
                                    <option value="18 a 25 años">18 a 25 años</option>
                                    <option value="26 a 35 años">26 a 35 años</option>
                                    <option value="36 a 45 años">36 a 45 años</option>
                                    <option value="46 a 60 años">46 a 60 años</option>
                                    <option value="Mayor de 60 años">Mayor de 60 años</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Procedencia</label>
                                <select name="procedencia" class="form-select form-select-lg" required>
                                    <option value="">Selecciona tu procedencia</option>
                                    <option value="Riohacha">Riohacha</option>
                                    <option value="Otro municipio de La Guajira">Otro municipio de La Guajira</option>
                                    <option value="Otro departamento de Colombia">Otro departamento de Colombia</option>
                                    <option value="Extranjero">Extranjero</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Tipo de visitante</label>
                                <select name="tipo_visitante" class="form-select form-select-lg" required>
                                    <option value="">Selecciona tu tipo</option>
                                    <option value="Turista">Turista</option>
                                    <option value="Residente">Residente</option>
                                    <option value="Estudiante">Estudiante</option>
                                    <option value="Investigador">Investigador</option>
                                    <option value="Otro">Otro</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill py-3">
                                Acceder a la información cultural
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div class="text-end small text-muted pe-3 pb-2">Autor: Jose Daniel Melendez Somosa</div>
</body>
</html>
