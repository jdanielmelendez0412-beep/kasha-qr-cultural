<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ka'sha - Tambor Wayuu | Riohacha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container text-center py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        <img th:src="@{/img/qr-kasha.png}" alt="Código QR Ka'sha" class="qr-code mb-4" style="width:200px;height:200px;">
                        <h1 class="display-5 fw-bold text-primary">Ka'sha</h1>
                        <h2 class="h4 text-secondary mb-3">Tambor Wayuu</h2>
                        <p class="lead text-muted mb-4">
                            Monumento cultural representativo de Riohacha, La Guajira.<br>
                            Escanea el código QR o ingresa para conocer su historia y significado.
                        </p>
                        <a th:href="@{/formulario}" class="btn btn-primary btn-lg px-5 py-3 rounded-pill">
                            Ingresar
                        </a>
                        <p class="mt-3 small text-muted">Al ingresar, contribuyes con información estadística anónima para el análisis turístico y cultural.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <div class="text-end small text-muted pe-3 pb-2">Autor: Jose Daniel Melendez Somosa</div>
</body>
</html>
