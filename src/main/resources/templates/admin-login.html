<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Ka'sha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-body p-4 text-center">
                        <h3 class="fw-bold text-primary mb-4">Acceso Administrador</h3>
                        <form th:action="@{/admin/login}" method="post">
                            <div class="mb-3">
                                <input type="password" name="password" class="form-control form-control-lg rounded-pill text-center" placeholder="Contraseña" required>
                            </div>
                            <p th:if="${param.error}" class="text-danger small">Contraseña incorrecta</p>
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5">Ingresar</button>
                        </form>
                        <a th:href="@{/}" class="btn btn-link mt-3">Volver al inicio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="text-end small text-muted pe-3 pb-2">Autor: Jose Daniel Melendez Somosa</div>
</body>
</html>
